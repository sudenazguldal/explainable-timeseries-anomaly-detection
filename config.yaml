project:
  random_seeds: [42, 123, 2026, 7, 999]

datasets:
  skab:
    raw_path: "data/raw/skab"
    use_groups: ["valve1", "valve2"]
    target_column: "anomaly"
    excluded_columns: ["datetime", "changepoint", "source_group", "source_file", "label"]
    group_column: "source_file"

  batadal:
    raw_path: "data/raw/batadal/training_dataset_2"
    time_column_candidates: ["DATETIME", "datetime", "DateTime"]
    target_column_candidates: ["ATT_FLAG", "attack", "anomaly", "label"]
    split:
      train: 0.60
      validation: 0.20
      test: 0.20

preprocessing:
  normalization: "standard"
  pca_components: 1

automata:
  fixed:
    window_size: 4
    alphabet_size: 3
  parameter_grid:
    window_size: [3, 4, 5, 6]
    alphabet_size: [3, 4, 5, 6]
  paa_segments: 256
  fallback_probability: 0.000001
  anomaly_threshold: 0.05
  threshold_candidates: [0.000001, 0.00001, 0.0001, 0.001, 0.005, 0.01, 0.03, 0.05, 0.1]

deep_learning:
  sequence_length: 32
  batch_size: 32
  max_epochs: 50
  early_stopping_patience: 5
  models: ["lstm", "cnn1d"]
  use_class_weighting: true
  tune_threshold: true
  classification_threshold: 0.5
  threshold_candidates: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]

experiments:
  scenarios: ["original", "gaussian_noise", "unseen"]
  noise:
    mean: 0.0
    std: 0.05

logging:
  results_dir: "reports/results"
  figures_dir: "reports/figures"
